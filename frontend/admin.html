<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPAC-B | Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <div class="flex flex-col lg:flex-row min-h-screen">

        <aside class="w-full lg:w-64 bg-slate-800 border-r border-slate-700 p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tighter">SIPAC-B <span
                        class="text-indigo-400 text-xs block">ADMIN</span></h1>
            </div>

            <nav class="space-y-2">
                <a href="#"
                    class="flex items-center gap-3 bg-indigo-600/10 text-indigo-400 px-4 py-3 rounded-xl font-bold">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    Padrón Electoral
                </a>
                <a href="/observador.html"
                    class="flex items-center gap-3 text-slate-400 hover:bg-slate-700/50 px-4 py-3 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    Resultados Blockchain
                </a>
            </nav>

            <div class="mt-auto pt-10">
                <button onclick="window.location.href='/'"
                    class="w-full border border-slate-700 hover:bg-slate-700 text-slate-300 py-2 rounded-lg text-sm transition">Cerrar
                    Sesión</button>
            </div>
        </aside>

        <main class="flex-grow p-6 lg:p-10">
            <div class="max-w-6xl mx-auto">

                <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                    <div>
                        <h2 class="text-3xl font-bold text-white">Gestión del Padrón</h2>
                        <p class="text-slate-400">Monitoreo de ciudadanos registrados y estado de participación.</p>
                    </div>
                    <button onclick="cargarPadron()"
                        class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-bold transition shadow-lg shadow-indigo-600/20">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Sincronizar Datos
                    </button>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                        <p class="text-slate-400 text-sm font-bold uppercase tracking-wider mb-1">Total Ciudadanos</p>
                        <h3 id="stat-total" class="text-4xl font-black text-white">--</h3>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                        <p class="text-green-400/80 text-sm font-bold uppercase tracking-wider mb-1">Votos Emitidos</p>
                        <h3 id="stat-votaron" class="text-4xl font-black text-green-400">--</h3>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                        <p class="text-indigo-400/80 text-sm font-bold uppercase tracking-wider mb-1">Participación</p>
                        <h3 id="stat-porcentaje" class="text-4xl font-black text-indigo-400">--%</h3>
                    </div>
                </div>

                <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-900/50 border-b border-slate-700">
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Nombre Completo
                                    </th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">CURP /
                                        Identificador</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase text-center">Estado
                                        de Voto</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase text-right">Fecha
                                        Registro</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-usuarios" class="divide-y divide-slate-700">
                                <tr>
                                    <td colspan="4" class="px-6 py-10 text-center text-slate-500 italic">Cargando padrón
                                        electoral...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        async function cargarPadron() {
            try {
                const respuesta = await fetch('/api/padron');
                const ciudadanos = await respuesta.json();

                const tabla = document.getElementById('tabla-usuarios');
                tabla.innerHTML = '';

                let totalVotaron = 0;

                ciudadanos.forEach(c => {
                    if (c.haVotado) totalVotaron++;

                    const fecha = new Date(c.fechaRegistro).toLocaleDateString('es-MX', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });

                    const fila = `
                        <tr class="hover:bg-slate-700/30 transition">
                            <td class="px-6 py-4 font-bold text-slate-200">${c.nombre}</td>
                            <td class="px-6 py-4 font-mono text-xs text-indigo-300">${c.ine}</td>
                            <td class="px-6 py-4 text-center">
                                ${c.haVotado
                            ? '<span class="px-3 py-1 bg-green-500/10 text-green-500 rounded-full text-[10px] font-bold border border-green-500/20">VOTÓ</span>'
                            : '<span class="px-3 py-1 bg-yellow-500/10 text-yellow-500 rounded-full text-[10px] font-bold border border-yellow-500/20">PENDIENTE</span>'}
                            </td>
                            <td class="px-6 py-4 text-right text-xs text-slate-500">${fecha}</td>
                        </tr>
                    `;
                    tabla.innerHTML += fila;
                });

                // Actualizar Estadísticas
                const total = ciudadanos.length;
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-votaron').innerText = totalVotaron;
                document.getElementById('stat-porcentaje').innerText = total > 0 ? Math.round((totalVotaron / total) * 100) : 0;

            } catch (error) {
                console.error("Error al cargar padrón:", error);
            }
        }

        // Cargar datos al entrar
        document.addEventListener('DOMContentLoaded', cargarPadron);
    </script>
</body>

</html>
