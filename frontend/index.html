<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPAC-B | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <header class="bg-[#1e3a8a] py-8 text-center shadow-md">
        <div class="flex flex-col items-center justify-center">
            <div class="w-12 h-12 border-2 border-white rounded-full flex items-center justify-center mb-2">
                <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-widest">SIPAC-B</h1>
            <p class="text-blue-200 text-sm mt-1">Tu voz, tu elección.</p>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">

        <div class="w-full max-w-sm">
            <h2 class="text-2xl font-semibold text-slate-800 text-center mb-8">Iniciar Sesión</h2>

            <form id="form-login" onsubmit="iniciarSesion(event)" class="flex flex-col gap-5">

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">CURP /
                        Matrícula</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="identificador" required placeholder="Ej. ABCD123456..."
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-700">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••"
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-700">
                    </div>
                </div>

                <div id="error-msg"
                    class="hidden text-red-600 text-sm text-center font-medium bg-red-50 py-2 rounded border border-red-200">
                </div>

                <button type="submit" id="btn-login"
                    class="w-full bg-[#1e40af] hover:bg-[#1e3a8a] text-white font-medium py-2.5 rounded-md transition duration-200 flex justify-center items-center gap-2 mt-2">
                    Ingresar al sistema
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

            <div class="mt-8 text-center text-sm border-t border-slate-200 pt-6">
                <p class="text-slate-600">¿Eres nuevo en el padrón electoral?</p>
                <a href="/registro.html"
                    class="inline-block mt-2 font-semibold text-blue-600 hover:text-blue-800 hover:underline transition-colors">
                    Regístrate y verifica tu identidad aquí
                </a>
            </div>

        </div>
    </main>

    <script>
        async function iniciarSesion(event) {
            event.preventDefault();

            const identificador = document.getElementById('identificador').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            try {
                const respuesta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identificador, password })
                });

                const datos = await respuesta.json();

                if (!respuesta.ok) throw new Error(datos.error);

                // Guardamos los datos en la memoria temporal
                sessionStorage.setItem('sesion_ine', datos.ine);
                sessionStorage.setItem('sesion_nombre', datos.nombre);
                sessionStorage.setItem('sesion_rol', datos.rol); // Guardamos el rol por si lo necesitamos

                // REDIRECCIÓN INTELIGENTE: El servidor nos dice a dónde ir
                window.location.href = datos.redirect;

            } catch (error) {
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Ingresar al sistema <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>`;
            }
        }
    </script>
</body>

</html>
