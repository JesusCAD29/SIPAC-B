<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPAC-B | Panel Ciudadano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <header class="bg-[#153b8e] px-6 pt-8 pb-8 shadow-md text-white w-full">
        <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
            <div>
                <p class="text-sm text-blue-200/80 mb-0.5">BIENVENIDO(A)</p>
                <h1 id="nombre-ciudadano" class="text-xl md:text-3xl font-bold tracking-wide">CARGANDO...</h1>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="cerrarSesionGlobal()" class="hidden md:flex items-center gap-2 text-blue-200 hover:text-white transition bg-[#1e449e] px-4 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider border border-[#2b52b3] shadow-inner">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Cerrar Sesión
                </button>

                <button onclick="cerrarSesionGlobal()" title="Cerrar Sesión" class="w-12 h-12 md:w-14 md:h-14 bg-white rounded-full flex items-center justify-center shadow-md shrink-0 hover:bg-red-50 transition-colors group relative cursor-pointer border-2 border-transparent hover:border-red-400">
                    <svg class="w-6 h-6 md:w-7 md:h-7 text-[#153b8e] group-hover:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    <svg class="w-6 h-6 md:w-7 md:h-7 text-red-500 hidden group-hover:block animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-6 py-8 pb-32">
        <div class="max-w-7xl">
            <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 mb-6 uppercase tracking-tight">Procesos Electorales Vigentes</h2>

            <div id="contenedor-elecciones" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-slate-500 italic animate-pulse">Buscando procesos electorales disponibles...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50">
        <div class="max-w-7xl mx-auto flex justify-around items-center pt-3 pb-6 md:pb-4">
            <button class="flex flex-col items-center text-[#153b8e] gap-1 px-4 transition transform hover:scale-110">
                <svg class="w-6 h-6 md:w-7 md:h-7" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 3l8 6v12h-5v-7H9v7H4V9l8-6z" />
                </svg>
                <span class="text-[10px] md:text-xs font-bold uppercase">Inicio</span>
            </button>
            <button class="flex flex-col items-center text-slate-400 hover:text-slate-600 gap-1 px-4 transition transform hover:scale-110">
                <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span class="text-[10px] md:text-xs font-medium uppercase">Recibos</span>
            </button>
            <button class="flex flex-col items-center text-slate-400 hover:text-slate-600 gap-1 px-4 transition transform hover:scale-110 relative">
                <div class="absolute top-0 right-3 w-2.5 h-2.5 md:w-3 md:h-3 bg-red-500 rounded-full border-2 border-white"></div>
                <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span class="text-[10px] md:text-xs font-medium uppercase">Alertas</span>
            </button>
        </div>
    </nav>

    <script src="js/ciudadano.js"></script>
</body>

</html>
